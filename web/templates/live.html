<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Session | EduVision.ai</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-light: #f8fafc;
            --bg-card: #ffffff;
            --primary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            padding: 0;
            color: var(--text-main);
            min-height: 100vh;
            background-image: radial-gradient(circle at top left, rgba(59, 130, 246, 0.05) 0%, transparent 40%);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            align-items: center;
        }

        .nav-links span {
            margin-right: 20px;
            font-weight: 500;
            color: var(--text-muted);
        }

        .nav-links a {
            color: var(--text-main);
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        .panel {
            background: var(--bg-card);
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .video-wrapper {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            background: #e2e8f0;
            position: relative;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        img.feed {
            width: 100%;
            display: block;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: var(--bg-light);
            border: 1px solid rgba(0, 0, 0, 0.05);
            padding: 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .stat-info .label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .stat-info .value {
            font-size: 1.8rem;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            color: var(--text-main);
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
            font-size: 1rem;
        }

        #start-btn {
            background: var(--success);
        }

        #start-btn:hover:not(:disabled) {
            background: #059669;
        }

        #end-btn {
            background: var(--danger);
        }

        #end-btn:hover:not(:disabled) {
            background: #dc2626;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .indicator {
            text-align: center;
            margin-bottom: 15px;
            font-weight: 600;
            color: #ef4444;
            animation: pulse 2s infinite;
            display: none;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.6;
            }

            100% {
                opacity: 1;
            }
        }

        canvas {
            background: var(--bg-light);
            border-radius: 10px;
            padding: 10px;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
    </style>
</head>

<body>
    <nav>
        <div class="logo">EduVision.ai</div>
        <div class="nav-links">
            {% if user_name %}
            <span>Welcome, {{ user_name }}</span>
            {% endif %}
            <a href="/dashboard">Dashboard</a>
            <a href="/logout">Sign Out</a>
        </div>
    </nav>
    <div class="container">
        <div class="panel">
            <h2
                style="margin-top: 0; margin-bottom: 20px; font-family: 'Outfit'; font-weight: 600; color: var(--text-main);">
                Live Feed</h2>
            <div class="video-wrapper">
                <img src="{{ url_for('video_feed') }}" class="feed" alt="Video Feed">
            </div>
        </div>
        <div class="panel">
            <div class="indicator" id="recording-indicator">🔴 Recording Session...</div>
            <div class="controls">
                <button id="start-btn" onclick="startSession()">Start Session</button>
                <button id="end-btn" onclick="endSession()" disabled>End Session</button>
            </div>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-info">
                        <div class="label">Engagement</div>
                        <div class="value" id="engagement-val" style="color: var(--primary);">0%</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-info">
                        <div class="label">Emotion</div>
                        <div class="value" id="emotion-val">Waiting...</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-info">
                        <div class="label">Status</div>
                        <div class="value" id="status-val">Waiting...</div>
                    </div>
                </div>
            </div>
            <canvas id="engagementChart"></canvas>
        </div>
    </div>
    <script>
        Chart.defaults.color = '#64748b';
        Chart.defaults.font.family = 'Inter';
        const ctx = document.getElementById('engagementChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Score',
                    data: [],
                    borderColor: '#3b82f6',
                    backgroundColor: 'rgba(59, 130, 246, 0.1)',
                    borderWidth: 2,
                    tension: 0.4,
                    fill: true,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true, max: 100, grid: { color: 'rgba(0,0,0,0.05)' } },
                    x: { grid: { display: false } }
                }
            }
        });
        function updateStats() {
            fetch('/api/stats')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('engagement-val').innerText = data.engagement_score + '%';
                    document.getElementById('emotion-val').innerText = data.emotion;
                    document.getElementById('status-val').innerText = data.status;
                    const sBtn = document.getElementById('start-btn'), eBtn = document.getElementById('end-btn'), ind = document.getElementById('recording-indicator');
                    if (data.session_active) {
                        sBtn.disabled = true; eBtn.disabled = false; ind.style.display = 'block';
                    } else {
                        sBtn.disabled = false; eBtn.disabled = true; ind.style.display = 'none';
                    }
                    chart.data.labels.push(new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }));
                    chart.data.datasets[0].data.push(data.engagement_score);
                    if (chart.data.labels.length > 20) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); }
                    chart.update();
                }).catch(e => console.error(e));
        }
        function startSession() { fetch('/api/start_session', { method: 'POST' }).then(() => updateStats()); }
        function endSession() { fetch('/api/end_session', { method: 'POST' }).then(() => { updateStats(); alert("Session Ended. You can view the report in the Dashboard."); }); }
        setInterval(updateStats, 1000);
    </script>
</body>

</html>
